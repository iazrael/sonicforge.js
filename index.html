<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SonicForge - Game Audio Engine</title>
    <style>
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --accent: #58a6ff;
        --text: #c9d1d9;
        --border: #30363d;
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
      }
      h1 {
        color: var(--accent);
        margin-bottom: 10px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      .section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .section h2 {
        margin-top: 0;
        color: var(--accent);
        font-size: 1.2rem;
      }
      .btn-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
      }
      button {
        background: #238636;
        color: white;
        border: none;
        padding: 12px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.2s;
      }
      button:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      button:active {
        transform: translateY(0);
      }
      button.secondary {
        background: #21262d;
        border: 1px solid var(--border);
      }
      button.danger {
        background: #da3633;
      }
      #status {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--card);
        border: 1px solid var(--border);
        padding: 10px 15px;
        border-radius: 6px;
        font-size: 14px;
      }
      #visualizer {
        background: #000;
        width: 100%;
        height: 100px;
        border-radius: 4px;
        margin-bottom: 10px;
      }
      .info {
        font-size: 14px;
        color: #8b949e;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>SonicForge</h1>
      <p class="info">Game Audio Synthesis Engine - Click any button to initialize audio</p>

      <canvas id="visualizer"></canvas>

      <div class="section">
        <h2>UI Sounds</h2>
        <div class="btn-grid">
          <button data-sound="ui.click">Click</button>
          <button data-sound="ui.confirm">Confirm</button>
          <button data-sound="ui.cancel">Cancel</button>
        </div>
      </div>

      <div class="section">
        <h2>Weapons</h2>
        <div class="btn-grid">
          <button data-sound="weapon.vulcan">Vulcan</button>
          <button data-sound="weapon.laser">Laser</button>
          <button data-sound="weapon.missile">Missile</button>
          <button data-sound="weapon.wave">Wave</button>
          <button data-sound="weapon.plasma">Plasma</button>
          <button data-sound="weapon.tesla">Tesla</button>
          <button data-sound="weapon.magma">Magma</button>
          <button data-sound="weapon.shuriken">Shuriken</button>
        </div>
      </div>

      <div class="section">
        <h2>Explosions & Hits</h2>
        <div class="btn-grid">
          <button data-sound="explosion.small">Small Explosion</button>
          <button data-sound="explosion.large">Large Explosion</button>
          <button data-sound="hit.shield">Shield Hit</button>
          <button data-sound="hit.hull">Hull Hit</button>
        </div>
      </div>

      <div class="section">
        <h2>Game Events</h2>
        <div class="btn-grid">
          <button data-sound="game.powerup">Power Up</button>
          <button data-sound="game.levelup">Level Up</button>
          <button data-sound="game.victory">Victory</button>
          <button data-sound="game.defeat">Defeat</button>
          <button data-sound="game.bossWarning" class="danger">Boss Warning</button>
        </div>
      </div>

      <div class="section">
        <h2>Spatial Audio Demo</h2>
        <p class="info">Click to play explosion with different pan positions (-1 = left, 1 = right)</p>
        <div class="btn-grid">
          <button data-sound="explosion.large" data-pan="-1">Left</button>
          <button data-sound="explosion.large" data-pan="-0.5">Left-Center</button>
          <button data-sound="explosion.large" data-pan="0">Center</button>
          <button data-sound="explosion.large" data-pan="0.5">Right-Center</button>
          <button data-sound="explosion.large" data-pan="1">Right</button>
        </div>
      </div>
    </div>

    <div id="status">Status: Ready</div>

    <script type="module" src="/src/main.ts"></script>
    <script type="module">
      import { audio, AUDIO_CONFIG } from '/src/main'

      let initialized = false

      // Setup visualizer
      const canvas = document.getElementById('visualizer')
      const ctx = canvas.getContext('2d')
      canvas.width = canvas.offsetWidth
      canvas.height = canvas.offsetHeight

      function draw() {
        requestAnimationFrame(draw)

        if (!initialized) {
          ctx.fillStyle = '#000'
          ctx.fillRect(0, 0, canvas.width, canvas.height)
          return
        }

        const data = audio.getFrequencyData()
        ctx.fillStyle = '#000'
        ctx.fillRect(0, 0, canvas.width, canvas.height)

        const barWidth = (canvas.width / data.length) * 2.5
        let x = 0
        data.forEach(v => {
          ctx.fillStyle = `rgb(88, 166, ${v + 100})`
          ctx.fillRect(x, canvas.height - v / 2, barWidth, v / 2)
          x += barWidth + 1
        })
      }
      draw()

      // Sound button handlers
      document.querySelectorAll('[data-sound]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!initialized) {
            audio.init()
            initialized = true
            document.getElementById('status').textContent = 'Status: Audio Initialized'
          }

          const soundPath = btn.dataset.sound.split('.')
          const pan = parseFloat(btn.dataset.pan || '0')

          let config = AUDIO_CONFIG
          for (const key of soundPath) {
            config = config[key]
          }

          audio.play(config, pan)
        })
      })
    </script>
  </body>
</html>
