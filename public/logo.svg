<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="flameGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc02;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" />

  <!-- 锻造火焰 -->
  <g transform="translate(100, 120)">
    <ellipse cx="0" cy="10" rx="25" ry="8" fill="url(#flameGradient)" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="url(#flameGradient)" opacity="0.8"/>
    <ellipse cx="0" cy="-12" rx="12" ry="16" fill="url(#flameGradient)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="10" fill="#ffcc02"/>
  </g>

  <!-- 声波 -->
  <g stroke="url(#waveGradient)" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- 中心主波 -->
    <path d="M 40 85 Q 55 100 40 115" stroke-width="5"/>
    <path d="M 160 85 Q 145 100 160 115" stroke-width="5"/>

    <!-- 内波 -->
    <path d="M 55 80 Q 75 100 55 120" stroke-width="3" opacity="0.9"/>
    <path d="M 145 80 Q 125 100 145 120" stroke-width="3" opacity="0.9"/>

    <!-- 外波 -->
    <path d="M 25 75 Q 50 100 25 125" stroke-width="2" opacity="0.6"/>
    <path d="M 175 75 Q 150 100 175 125" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- 音频波形线 -->
  <polyline points="70,100 80,85 90,115 100,70 110,130 120,90 130,100"
            fill="none" stroke="url(#flameGradient)" stroke-width="3"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 文字 -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="18" font-weight="bold" fill="#ffffff">SONICFORGE</text>
</svg>
